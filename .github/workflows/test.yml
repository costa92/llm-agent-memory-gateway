name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

env:
  GOWORK: off  # INFRA-02: CI never picks up a workspace file silently

# Workspace-only module: go.mod carries local `replace` directives onto sibling
# repos (contract/postgres are unpublished). CI mirrors those replace targets by
# checking the siblings out next to this repo so `../<sibling>` resolves.
jobs:
  go:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout llm-agent-memory-gateway
        uses: actions/checkout@v4
        with:
          path: llm-agent-memory-gateway
      - name: Checkout llm-agent-memory-contract
        uses: actions/checkout@v4
        with:
          repository: costa92/llm-agent-memory-contract
          ref: main
          path: llm-agent-memory-contract
      - name: Checkout llm-agent-memory-postgres
        uses: actions/checkout@v4
        with:
          repository: costa92/llm-agent-memory-postgres
          ref: main
          path: llm-agent-memory-postgres
      - name: Checkout llm-agent-rag
        uses: actions/checkout@v4
        with:
          repository: costa92/llm-agent-rag
          ref: master
          path: llm-agent-rag
      - uses: actions/setup-go@v5
        with:
          go-version-file: llm-agent-memory-gateway/go.mod
          cache: true
      - name: go mod tidy (drift check)
        working-directory: llm-agent-memory-gateway
        run: |
          go mod tidy
          drift=$(git status --porcelain go.mod go.sum 2>/dev/null)
          if [ -n "$drift" ]; then
            echo "go mod tidy changed files — commit tidy changes first"
            echo "$drift"
            git --no-pager diff -- go.mod go.sum || true
            exit 1
          fi
      - name: go vet
        working-directory: llm-agent-memory-gateway
        run: go vet ./...
      - name: go build
        working-directory: llm-agent-memory-gateway
        run: go build ./...
      - name: go test
        working-directory: llm-agent-memory-gateway
        run: go test ./...
